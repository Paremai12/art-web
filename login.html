<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    min-height: 100vh;
    background: radial-gradient(circle at top, #f3e8ff, #ede9fe, #ddd6fe);
    display: flex;
    align-items: center;
}

.auth-card {
    max-width: 400px;
    margin: auto;
    border-radius: 24px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(124,58,237,0.15);
}

.auth-title {
    font-weight: 600;
    color: #6d28d9;
}

.form-control:focus {
    border-color: #a78bfa;
    box-shadow: 0 0 0 0.2rem rgba(167,139,250,0.25);
}

.btn-purple {
    background: linear-gradient(135deg, #8b5cf6, #7c3aed);
    color: white;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">
<div class="card auth-card p-4">

<h4 class="text-center auth-title mb-4">✨ Events Login ✨</h4>

<form id="loginForm">

<div class="form-floating mb-3">
<input type="text" class="form-control" id="ig" placeholder="Instagram" required>
<label>Instagram OC</label>
</div>

<div class="form-floating mb-3">
<input type="password" class="form-control" id="pw" placeholder="Password" required>
<label>Password</label>
</div>

<button class="btn btn-purple w-100 py-2">Login</button>

</form>

<div class="text-center mt-3">
<a href="register.html">Create account</a>
</div>

</div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            ig: ig.value,
            password: pw.value
        })
    });

    const data = await res.json();

    if (data.success) {
        localStorage.setItem("currentUser", JSON.stringify(data.user));

        // 🔥 ตรงนี้แหละที่ต้องใส่
        if (data.user.isAdmin) {
            window.location.href = "admin.html";
        } else {
            window.location.href = "home.html";
        }

    } else {
        alert("ข้อมูลผิด ❌");
    }
});
</script>

</body>
</html>
