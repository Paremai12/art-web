<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Panel 💜</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#fdf4ff,#f5e9ff,#ede9fe);
    font-family: 'Poppins', sans-serif;
}

/* card */
.admin-card {
    margin: 40px auto;
    max-width: 1100px;
    padding: 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(168,85,247,0.2);
}

/* table */
table {
    border-radius: 15px;
    overflow: hidden;
}

th {
    background: #a855f7 !important;
    color: white;
}

tr:hover {
    background: #f5e9ff;
}

/* score badge */
.badge-score {
    background: linear-gradient(135deg,#a855f7,#7c3aed);
    color: white;
    padding: 6px 12px;
    border-radius: 10px;
}

/* ranking colors */
.rank-1 { color: gold; font-weight: bold; }
.rank-2 { color: silver; font-weight: bold; }
.rank-3 { color: #cd7f32; font-weight: bold; }

/* title */
.title {
    font-weight: 700;
    color: #6b21a8;
}
</style>
</head>

<body>

<div class="container">
<div class="admin-card">

<h3 class="text-center mb-4 title">👑 Admin Leaderboard 👑</h3>

<table class="table table-bordered text-center align-middle">
<thead>
<tr>
<th>#</th>
<th>👤 Name</th>
<th>📸 IG</th>
<th>🔒 Password</th>
<th>🎓 Faculty</th>
<th>📅 Year</th>
<th>🏆 Score</th>
</tr>
</thead>

<tbody id="userTable"></tbody>
</table>

<div class="text-center">
<button class="btn btn-danger" onclick="logout()">Logout</button>
</div>

</div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("currentUser"));

// 🔥 guard
if (!user || !user.isAdmin) {
    location.href = "login.html";
}

// 🔥 load + sort + rank
async function loadUsers(){
    const res = await fetch("/users");
    const data = await res.json();

    const table = document.getElementById("userTable");
    table.innerHTML = "";

    let rank = 1;

    data
    .sort((a, b) => (b.bestScore || 0) - (a.bestScore || 0)) // 🔥 เรียงคะแนน
    .forEach(u => {

        let rankClass = "";
        if (rank === 1) rankClass = "rank-1";
        else if (rank === 2) rankClass = "rank-2";
        else if (rank === 3) rankClass = "rank-3";

        table.innerHTML += `
        <tr>
            <td class="${rankClass}">#${rank}</td>
            <td>${u.name || "-"}</td>
            <td>${u.ig}</td>
            <td>${u.password}</td>
            <td>${u.faculty}</td>
            <td>${u.year}</td>
            <td><span class="badge-score">${u.bestScore}</span></td>
        </tr>
        `;

        rank++;
    });
}

// 🔥 realtime ทุก 1 วิ
setInterval(loadUsers, 1000);
loadUsers();

function logout(){
    localStorage.removeItem("currentUser");
    location.href = "login.html";
}
</script>

</body>
</html>
